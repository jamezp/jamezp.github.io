<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James R. Perkins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #e4e4e7;
            background: #0a0a0a;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-content {
            background: #18181b;
            padding: 3rem 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            border: 1px solid #27272a;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fafafa;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
        }

        .links {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #27272a;
        }

        .links a {
            color: #60a5fa;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #71717a;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 2rem 1.5rem;
            }

            .links a {
                display: block;
                margin: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h1>James R. Perkins</h1>
            <p class="subtitle">Developer</p>

            <p>Welcome to jperkins.dev</p>

            <div class="links">
                <a href="https://github.com/jamezp" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>

        <footer>
            &copy; 2026 James R. Perkins
        </footer>
    </div>
</body>
</html>
